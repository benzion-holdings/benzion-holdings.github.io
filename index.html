<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Benzion Holdings — Residential real estate investment in Cleveland, OH.">
  <title>Benzion Holdings</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/images/favicon-192.png">
  <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">
  <meta name="theme-color" content="#F4F1EA">

  <!-- Open Graph -->
  <meta property="og:title" content="Benzion Holdings">
  <meta property="og:description" content="We acquire and hold residential properties in Cleveland, OH.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://benzionholdings.com/">
  <link rel="canonical" href="https://benzionholdings.com/">
  <meta property="og:image" content="https://benzionholdings.com/assets/images/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://benzionholdings.com/assets/images/og-image.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Benzion Holdings",
    "url": "https://benzionholdings.com",
    "logo": "https://benzionholdings.com/assets/images/logo.svg",
    "description": "Residential real estate investment in Cleveland, OH.",
    "email": "hello@benzionholdings.com",
    "areaServed": {
      "@type": "City",
      "name": "Cleveland",
      "containedInPlace": {
        "@type": "State",
        "name": "Ohio"
      }
    }
  }
  </script>
</head>
<body>

  <main class="hero">
    <div class="hero-inner">

      <div class="logo" aria-label="Benzion Holdings">

        <!-- Bridge Span mark: three pillars + arch (Cleveland nod) -->
        <svg class="logo-mark" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <line x1="6" y1="44" x2="58" y2="44" stroke="currentColor" stroke-width="1.5"/>
          <rect x="14" y="28" width="3" height="16" fill="currentColor"/>
          <rect x="22" y="20" width="3" height="24" fill="currentColor"/>
          <rect x="30" y="28" width="3" height="16" fill="currentColor"/>
          <path d="M 38 44 Q 46 32 54 44" fill="none" stroke="currentColor" stroke-width="1.5"/>
        </svg>

        <div class="logo-wordmark">
          <span class="logo-name">BENZION</span>
          <span class="logo-sub">HOLDINGS</span>
        </div>

      </div>

      <!-- Divider -->
      <div class="divider" aria-hidden="true"></div>

      <!-- Headline & descriptor -->
      <div class="descriptor">
        <p class="descriptor-headline">Residential Real Estate Investment</p>
        <p class="descriptor-body">We acquire and hold residential properties in Cleveland, OH.</p>
      </div>

      <!-- CTA -->
      <a href="mailto:hello@benzionholdings.com" class="cta">Get in Touch</a>

    </div>
  </main>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Benzion Holdings. All rights reserved.</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
